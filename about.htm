<!-- هنا ملف الصوت مخفي تماماً وبدون شريط تحكم وبخاصية التشغيل التلقائي والتكرار -->
<audio id="bg-music" src="Egyptian national anthem.mp3" autoplay loop style="display:none;"></audio>

<font face="Tahoma" color="skyblue" size="6">
    اسم المدرسة: مدرسة مصطفي خليل الثانوية بنين &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    تاريخ نشأة المدرسة: 17/7/1999
    <br><br>

</font>

<!-- الكود السحري لتشغيل الصوت في الخلفية فوراً بمجرد تفاعل المستخدم -->
<script>
    function playAudio() {
        var audio = document.getElementById('bg-music');
        audio.play().catch(function(error) {
            console.log("المتصفح حظر التشغيل التلقائي الصامت، جاري الانتظار...");
        });
    }

    // محاولة التشغيل فوراً عند تحميل الصفحة
    window.addEventListener('DOMContentLoaded', playAudio);

    // التحايل على المتصفح: إذا ضغط المستخدم في أي مكان بالصفحة يشتغل الصوت فوراً
    document.addEventListener('click', playAudio, { once: true });
    document.addEventListener('keydown', playAudio, { once: true });
    document.addEventListener('touchstart', playAudio, { once: true });
</script>
