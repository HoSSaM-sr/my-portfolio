<html>

<head> 
    <title> مدرستي </title>
</head>

<body dir="rtl" background="3.png">

<form name="form1" action="home.htm" onsubmit="return f1();">

<center>
<font face="tohame" color="red" size="6">
تسجيل بيانات طالب جديد
</font>
</center>

<br><br>

<!-- ضبطنا النسبة هنا لـ 25% عشان تزحف سنة بسيطة جهة الشمال وتتوسط الشاشة بشكل مثالي -->
<table border="0" cellpadding="8" style="font-size: 24px; color: red; font-family: 'tohame'; margin-right: 25%; margin-left: auto;">
    <tr>
        <td align="left">ادخل الاسم:</td>
        <td align="right"><input type="text" name="t1" style="width: 250px;"></td>
    </tr>
    <tr>
        <td align="left">ادخل كلمة المرور:</td>
        <td align="right"><input type="password" name="t2" style="width: 250px;"></td>
    </tr>
    <tr>
        <td align="left">اعد كتابة كلمة المرور السابقة:</td>
        <td align="right"><input type="password" name="t3" style="width: 250px;"></td>
    </tr>
    <tr>
        <td align="left">السن بالارقام:</td>
        <td align="right"><input type="text" name="t4" style="width: 250px;"></td>
    </tr>
</table>

<br>

<center>
<font face="tohame" color="red" size="6">

النوع 
<input type="radio" name="a"> ذكر
<input type="radio" name="a"> انثي

<br><br>

اختر اللغة التي تجيدها<br>
العربية <input type="checkbox">
الانجليزية <input type="checkbox">
الفرنسية <input type="checkbox">

<br><br>

<input type="reset" value="حذف">
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
<input type="submit" value="ارسال">

</font>
</center>

</form>

<script>
function f1(){
    if(form1.t1.value == ""){
        alert("غير مسموح بترك حقل الاسم فارغ");
        return false; 
    }

    if(form1.t2.value.length < 8){
        alert("طول كلمة المرور لا يقل عن 8 احرف");
        return false; 
    }

    if(form1.t2.value !== form1.t3.value){
        alert("كلمة المرور التأكيدية لا تطابق كلمة المرور الأولى");
        return false; 
    }

    if(form1.t4.value == "" || isNaN(form1.t4.value)){
        alert("ادخل قيمة عددية صحيحة للسن");
        return false; 
    }

    return true; 
}
</script>

</body>
</html>
